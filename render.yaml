services:
  - type: web
    name: fomc-ai-analyzer-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    disk:
      name: fomc-persistent-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: CHROMA_PERSIST_PATH
        value: /var/data/chroma_db
      - key: SQLITE_DB_PATH
        value: /var/data/ck_workspace.db
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MIN_SIMILARITY_THRESHOLD
        value: "0.50"
      - key: TOP_K_RETRIEVAL
        value: "5"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
